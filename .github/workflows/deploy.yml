name: Build, test & deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scoped per-ref: keeps deploys of the same branch from overlapping,
  # without cancelling unrelated PR runs (e.g. Dependabot opening several
  # PRs at once shouldn't cancel the actual main-branch deploy).
  group: pages-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Smoke-test the actual build output (served via `vite preview`, same
      # as production) before it's allowed to deploy. See tests/smoke.spec.js.
      - run: npx playwright install --with-deps chromium
      - run: npm test
      # Pages steps only run on a push to the default branch AND when Pages is
      # switched on via the ENABLE_PAGES repository variable. The repo is
      # currently private, so Pages is off; the build + smoke test above still
      # run on every push and PR as the QA gate. To go live: make the repo
      # public (or upgrade), enable Pages (Settings → Pages → Source: GitHub
      # Actions), and set repo variable ENABLE_PAGES=true.
      - uses: actions/configure-pages@v5
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_PAGES == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_PAGES == 'true'
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
