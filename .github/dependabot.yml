version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    # Bundle all npm updates into a single pull request instead of one per package.
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    # Bundle all GitHub Actions updates into a single pull request.
    groups:
      github-actions:
        patterns:
          - "*"
